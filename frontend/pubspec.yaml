name: streambox
description: Streaming-first personal music player.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.3
  flutter_acrylic: ^1.1.4
  http: ^1.2.2
  media_kit: ^1.2.0
  media_kit_libs_audio: ^1.0.5
  window_manager: ^0.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
