name: Native core

on:
  pull_request:
  push:
    branches: [main]

jobs:
  rust:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/streambox_core
      - name: Check Rust core formatting
        run: cargo fmt --manifest-path native/streambox_core/Cargo.toml -- --check
      - name: Test Rust core
        run: cargo test --manifest-path native/streambox_core/Cargo.toml

  flutter:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/streambox_core
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Install Flutter dependencies
        working-directory: frontend
        run: flutter pub get
      - name: Analyze Flutter
        working-directory: frontend
        run: flutter analyze
      - name: Test Flutter
        working-directory: frontend
        run: flutter test
      - name: Build Windows Rust core
        run: ./scripts/build-windows-core.ps1 -Configuration Debug
      - name: Build Windows debug shell
        working-directory: frontend
        run: flutter build windows --debug

  android-bridge:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
          cache-dependency-path: |
            frontend/android/**/*.gradle*
            frontend/android/gradle/wrapper/gradle-wrapper.properties
      - uses: android-actions/setup-android@v3
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: native/streambox_core
          shared-key: android-core
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - name: Cache Android NDK
        id: android-ndk-cache
        uses: actions/cache@v4
        with:
          path: ${{ env.ANDROID_HOME }}\ndk\28.2.13676358
          key: android-ndk-28.2.13676358-${{ runner.os }}
      - name: Install Android NDK
        run: |
          $ndkPath = Join-Path $env:ANDROID_HOME 'ndk/28.2.13676358'
          if (-not (Test-Path -LiteralPath $ndkPath)) {
            sdkmanager "ndk;28.2.13676358"
          } else {
            Write-Host "Android NDK already restored at $ndkPath"
          }
      - name: Install Flutter dependencies
        working-directory: frontend
        run: flutter pub get
      - name: Build Android Rust core
        run: ./scripts/build-android-core.ps1
      - name: Build Android debug shell
        working-directory: frontend
        run: flutter build apk --debug
